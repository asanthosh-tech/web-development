<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Student Manager V2</title>
  <style>
    h1 {
      text-align: center;
    }
    input{
      display: block;
      padding: 5px 10px;
      margin: 8px auto;
      border-radius: 5px;
    }
    button{
      background-color: lightblue;
      border-radius: 4px;
      color: white;
      font-weight: bold;
      display: inline-block;
      margin: 4px 8px;
      padding: 6px;
    }
  </style>
</head>
<body>
  <h1>STUDENT MANAGER</h1>
  <input id="studentname" placeholder="Add Student">
  <button id="addbtn">ADD STUDENT</button>
  <button id="removebtn">REMOVE STUDENT</button>
  <button id="clearbtn">CLEAR</button>
  <h3 id="count"></h3>
  <ul id="list"></ul>
</body>
<script src="script.js">
</script>
</html>
