<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Weather Report</title>
  <link rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap@latest/dist/css/bootstrap.css">
</head>
<body class="bg-dark-subtle">
  <nav class="navbar bg-dark ">
    <div class="container">
      <span class="text-light w-100 text-center">WEATHER REPORT</span>
    </div>
  </nav>
  <div class="container mt-4 p-4">
    <div class="card bg-dark">
      <div class="card-body">
        <input class="form-control mt-2" id="cityinput" placeholder="Enter City">
        <button class="btn btn-primary w-100
          mt-4" id="searchbtn">Get Weather</button>
      </div>
    </div>
    <p class=" mt-3"id="status"></p>
    <div class=" card mt-4 bg-success-subtle p-3 border border-dark rounded-4" id="result">
      <div class="card-body">
        <h5 class="card-title mb-3"id="cityname"></h5>
        <div class="card-text">
          <p id="temp"></p>
          <p id="humidity"></p>
          <p id="climate"></p>
        </div>
      </div>
    </div>
  </div>
</body>
<script src="script.js"></script>
</html>
