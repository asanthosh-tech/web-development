<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title></title>
  <style>
  h1 {
      text-align: center;
    }
    input{
      display: block;
      padding: 5px 10px;
      margin: 8px auto;
      border-radius: 5px;
    }
    button{
      background-color: lightblue;
      border-radius: 4px;
      color: white;
      font-weight: bold;
      display: inline-block;
      margin: 4px 8px;
      padding: 6px;
    }
  </style>
</head>
<body>
  <h1 style="text-align:center">
    Student Search Application
  </h1>
  <input id="name" placeholder="Add student">
  <button id="addbtn">Add</button>
  <button id="removebtn">REMOVE</button>
  <input id="searchname" placeholder="search name">
  <button id="searchbtn">Search</button>
  <button id="allbtn">All</button>
  <button id="passbtn">Passed</button>
  <h4 id="count">Total Students:</h4>
  <h4 id="result">Search Result:</h4>
  <ul id="list"></ul>
</body>
<script src="script.js"></script>
</html>
