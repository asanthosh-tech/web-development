<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>College Dashboard</title>
  <link rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap@latest/dist/css/bootstrap.css">
</head>
<body class="bg-secondary-subtle">
  <nav class="navbar bg-dark">
    <div class="container">
      <span class="w-100 text-center navbar-brand text-white">College Management System</span>
    </div>
  </nav>
  <p class=" text-center lead alert alert-success p-2 mt-2">
    Student Added Successfully
  </p>
  <div class="container mt-4 p-4">
    <div class=" container d-md-flex align-content-center gap-2">
      <div class="card col-md-3 mt-2 mb-2 bg-info-subtle">
        <div class="card-body">
          <h4 class="card-title text-center">Total Students</h4>
          <p class="card-text text-center">
            520
          </p>
        </div>
      </div>
      <div class="card col-md-3 mt-2 mb-2 bg-info-subtle">
        <div class="card-body">
          <h4 class="card-title text-center">Teachers</h4>
          <p class="card-text text-center">
            38
          </p>
        </div>
      </div>
      <div class="card col-md-3 mt-2 mb-2 bg-info-subtle">
        <div class="card-body">
          <h4 class="card-title text-center">Courses</h4>
          <p class="card-text text-center">
            12
          </p>
        </div>
      </div>
      <div class="card col-md-3 mt-2 mb-2 bg-info-subtle">
        <div class="card-body">
          <h4 class="card-title text-center">Departments</h4>
          <p class="card-text text-center">
            6
          </p>
        </div>
      </div>
    </div>
    <div class="mt-4 form-label p-2 bg-dark border rounded-5 border-secondary
      p-4 ">
      <h3 class="fw-bold text-center text-white">
        Student Registration
      </h3>
      <input class="text-center form-control w-100 mt-4 "placeholder="Enter Student Name">
      <input class="text-center form-control w-100 mt-4 "placeholder="Select Course">
      <input type="number" class="text-center form-control w-100 mt-4 "placeholder="Enter Year">
      <button class="btn btn-primary mt-4 w-100 mb-4">Add Student</button>
    </div>
    <div>
      <h4 class="fw-bold mt-5 mb-2 text-center">Students Data</h4>
      <table class="mt-4 table table-bordered table-hover table-striped rounded-2">
        <thead>
          <tr>
            <th>Id</th>
            <th>Name</th>
            <th>Course</th>
            <th>Year</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>1</td>
            <td>Santhosh</td>
            <td>cse</td>
            <td>3rd</td>
            <td><button class="btn badge w-100 bg-success">Active</button></td>
          </tr>
          <tr>
            <td>2</td>
            <td>hari</td>
            <td>ece</td>
            <td>3rd</td>
            <td><button class="btn badge w-100 bg-danger">Inactive</button></td>
          </tr>
          <tr>
            <td>3</td>
            <td>Ranjith</td>
            <td>cse</td>
            <td>4th</td>
            <td><button class="btn badge w-100 bg-success">Active</button></td>
          </tr>
          <tr>
            <td>4</td>
            <td>ram</td>
            <td>eee</td>
            <td>2nd</td>
            <td><button class="btn badge w-100 bg-danger">Inactive</button></td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="progress mt-4">
      <div class="progress-bar pt-2 pb-2 bg-primary" style="width:75%">
        75% Admissions
        Completed
      </div>
    </div>
  </div>
</body>
<script></script>
</html>
